apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"   
spec:
  project: default
  source:
    repoURL: https://github.com/Hoaqim/link-archiver-gitops
    targetRevision: main
    path: infra
    directory:
      recurse: false   
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true