apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: link-archiver
  region: eu-central-1
  version: "1.30"

iam:
  withOIDC: true
  serviceAccounts:
    - metadata: { name: argocd-image-updater, namespace: argocd }
      roleName: argocd-image-updater-irsa
      roleOnly: true
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

    - metadata: { name: link-archiver-api, namespace: link-archiver-dev }
      roleName: link-archiver-api-dev
      roleOnly: true
      attachPolicy: &appPolicy
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: [sqs:SendMessage, sqs:ReceiveMessage, sqs:DeleteMessage, sqs:GetQueueAttributes]
            Resource: arn:aws:sqs:eu-central-1:*:link-archiver-*
          - Effect: Allow
            Action: [s3:PutObject, s3:GetObject, s3:HeadObject]
            Resource: arn:aws:s3:::link-archiver-*/*
          - Effect: Allow
            Action: [s3:ListBucket]
            Resource: arn:aws:s3:::link-archiver-*

    - metadata: { name: link-archiver-worker, namespace: link-archiver-dev }
      roleName: link-archiver-worker-dev
      roleOnly: true
      attachPolicy: *appPolicy

    - metadata: { name: link-archiver-api, namespace: link-archiver-prod }
      roleName: link-archiver-api-prod
      roleOnly: true
      attachPolicy: *appPolicy

    - metadata: { name: link-archiver-worker, namespace: link-archiver-prod }
      roleName: link-archiver-worker-prod
      roleOnly: true
      attachPolicy: *appPolicy
    
    - metadata: { name: aws-load-balancer-controller, namespace: kube-system }
      roleName: aws-load-balancer-controller-irsa
      roleOnly: true
      wellKnownPolicies:
        awsLoadBalancerController: true

managedNodeGroups:
  - name: workers-spot
    instanceType: t3.small
    spot: true
    desiredCapacity: 2
    minSize: 1
    maxSize: 3
    volumeSize: 20
    volumeType: gp3
    labels:
      role: worker
    tags:
      Project: link-archiver

addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy
  - name: aws-ebs-csi-driver